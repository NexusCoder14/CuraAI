    <style>
      html, body { background: #050816; color: #e8ecff; }
      /* Initial paint placeholder so users never see a white flash */
      #boot { position: fixed; inset: 0; display: grid; place-items: center; pointer-events: none; }
      #boot .o { width: 64px; height: 64px; border-radius: 9999px; background: radial-gradient(circle at 30% 25%, #fff, #8b5cf6 30%, #3b82f6 60%, #e879f9 100%); box-shadow: 0 0 60px #8b5cf6aa; animation: p 1.4s ease-in-out infinite; }
      @keyframes p { 0%,100% { transform: scale(0.95); opacity: 0.85 } 50% { transform: scale(1.05); opacity: 1 } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot"><div class="o"></div></div>
